<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneBox | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --panel: rgba(24, 24, 27, 0.7);
            --border: rgba(39, 39, 42, 0.8);
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.5);
            --accent: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.08), transparent 25%);
            color: var(--text-main); 
            min-height: 100vh;
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            animation: fadein 0.8s ease-out;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; text-shadow: 0 0 20px var(--primary-glow); }
        .logo span { color: var(--primary); }

        .status-pill {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .live-dot {
            width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 1.5s infinite;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .glass-card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(14, 165, 233, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .main-value {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-value {
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        .progress-track {
            width: 100%; height: 6px; background: #27272a; border-radius: 10px; margin-top: 15px; overflow: hidden;
        }
        
        .progress-fill {
            height: 100%; background: var(--primary); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .battery-fill { background: var(--accent); }
        .battery-low { background: var(--danger); }

        .term-card {
            background: #000;
            border: 1px solid #333;
            border-top: 3px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            height: 200px;
            overflow-y: auto;
            color: #10b981;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .term-card p { margin-bottom: 6px; line-height: 1.4; }
        .term-prefix { color: #64748b; margin-right: 8px; }
        .term-highlight { color: #0ea5e9; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Phone<span>Box</span></div>
            <div class="status-pill">
                <div class="live-dot"></div>
                SERVER ONLINE
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Network Card -->
            <div class="glass-card">
                <div class="card-header">
                    <span>CELLULAR NETWORK</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                </div>
                <div class="main-value" id="val-operator">Searching...</div>
                <div class="sub-value">
                    <span style="color: var(--accent); font-weight: 600;" id="val-net-type">Unknown</span> •
                    Ping: <span id="val-ping">--</span> •
                    IP: <span id="val-ip">--</span>
                </div>
            </div>

            <!-- Wi-Fi Clients Card -->
            <div class="glass-card">
                <div class="card-header">
                    <span>WIFI CLIENTS</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <div class="main-value" id="val-clients">0</div>
                <div class="sub-value">Active Devices Connected</div>
            </div>

            <!-- Battery Card -->
            <div class="glass-card">
                <div class="card-header">
                    <span>BATTERY STATUS</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #fbbf24"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></svg>
                </div>
                <div class="main-value" id="val-batt">--%</div>
                <div class="sub-value" id="val-volt">Voltage: -- mV</div>
                <div class="progress-track">
                    <div class="progress-fill battery-fill" id="bar-batt" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Memory Card -->
            <div class="glass-card">
                <div class="card-header">
                    <span>MEMORY USAGE</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #a855f7"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                </div>
                <div class="main-value" id="val-ram">-- MB</div>
                <div class="sub-value">Free out of <span id="val-ram-tot">--</span> MB</div>
                <div class="progress-track">
                    <div class="progress-fill" id="bar-ram" style="width: 0%; background: #a855f7;"></div>
                </div>
            </div>

            <!-- Data Usage Card -->
            <div class="glass-card">
                <div class="card-header">
                    <span>DATA USAGE</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #f43f5e"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div class="main-value" id="val-data-rx">-- MB</div>
                <div class="sub-value">Downloaded (Cellular)</div>
                <div style="margin-top:15px; font-size: 1.1rem; font-weight: 600; color: var(--primary);" id="val-data-tx">-- MB Uploaded</div>
            </div>
        </div>

        <div class="term-card" id="terminal">
            <p><span class="term-prefix">[root@phonebox]</span> Initializing core systems...</p>
        </div>
    </div>

    <script>
        const term = document.getElementById('terminal');
        const MAX_LOG_LINES = 5;
        
        function logMsg(msg, isAction = false) {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const colorClass = isAction ? 'term-highlight' : '';
            p.innerHTML = `<span class="term-prefix">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
            term.appendChild(p);
            while (term.children.length > MAX_LOG_LINES) {
                term.removeChild(term.firstElementChild);
            }
            term.scrollTop = term.scrollHeight;
        }

        function formatUptime(seconds) {
            if(!seconds || isNaN(seconds)) return "0m";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        async function fetchApiJson() {
            const stamp = Date.now();
            const urls = [
                `/cgi-bin/api.sh?t=${stamp}`,
                `${window.location.protocol}//${window.location.hostname}:9000/cgi-bin/api.sh?t=${stamp}`,
                `http://192.168.100.1:9000/cgi-bin/api.sh?t=${stamp}`
            ];
            let lastError = null;

            for (const url of urls) {
                try {
                    const res = await fetch(url, { cache: 'no-store' });
                    if (!res.ok) {
                        throw new Error(`${url} HTTP ${res.status}`);
                    }
                    return await res.json();
                } catch (err) {
                    lastError = err;
                }
            }

            throw lastError || new Error('fetch failed');
        }

        async function fetchStats() {
            try {
                const data = await fetchApiJson();
                
                // Network
                document.getElementById('val-operator').innerText = data.operator !== "N/A" ? data.operator : data.sim_state;
                document.getElementById('val-net-type').innerText = data.network_type || "Unknown";
                document.getElementById('val-ping').innerText = data.ping || "Offline";
                document.getElementById('val-ip').innerText = data.ip && data.ip !== "Offline" ? data.ip : "--";
                
                // Clients
                document.getElementById('val-clients').innerText = data.clients || "0";
                
                // Battery
                const batt = parseInt(data.battery);
                document.getElementById('val-batt').innerText = `${batt}%`;
                document.getElementById('val-volt').innerText = `Voltage: ${data.voltage} mV`;
                
                const battBar = document.getElementById('bar-batt');
                battBar.style.width = `${batt}%`;
                if(batt <= 20) {
                    battBar.classList.add('battery-low');
                    battBar.classList.remove('battery-fill');
                } else {
                    battBar.classList.add('battery-fill');
                    battBar.classList.remove('battery-low');
                }
                
                // RAM
                const total = parseInt(data.ram_total);
                const free = parseInt(data.ram_free);
                const used = total - free;
                const percent = Math.round((used / total) * 100);
                
                document.getElementById('val-ram').innerText = `${free} MB`;
                document.getElementById('val-ram-tot').innerText = total;
                document.getElementById('bar-ram').style.width = `${percent}%`;

                // Data Usage
                const rx = parseInt(data.rx_mb) || 0;
                const tx = parseInt(data.tx_mb) || 0;
                document.getElementById('val-data-rx').innerText = rx >= 1024 ? `${(rx/1024).toFixed(2)} GB` : `${rx} MB`;
                document.getElementById('val-data-tx').innerText = tx >= 1024 ? `${(tx/1024).toFixed(2)} GB Uploaded` : `${tx} MB Uploaded`;

                // Log heartbeat
                if (Math.random() > 0.7) {
                    logMsg(`Heartbeat OK — Load: ${data.load} | Uptime: ${formatUptime(data.uptime)}`, true);
                }

            } catch (err) {
                console.error("API Error", err);
                logMsg(`API retry: ${err.message || 'fetch failed'}`, false);
            }
        }

        logMsg("Connected to Pocket WiFi subsystem.", true);
        logMsg("Loading advanced diagnostics...");
        
        // Initial fetch
        setTimeout(fetchStats, 500);
        
        // Poll every 3.5 seconds
        setInterval(fetchStats, 3500);
    </script>
</body>
</html>
